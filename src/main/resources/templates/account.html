<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Dashboard</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Include your custom CSS if needed -->
    <style>
        /* Custom CSS for the sidebar */
        :root {
            --background-color: #ffffff;
            --text-color: #000000;
        }

        .dark-theme {
            --background-color: #333333;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            transition: background-color 0.5s, color 0.5s;
        }

        .theme-switch {
            margin-left: 10px;
            margin-top: 8px;
        }

        .navbar-brand {
            margin-right: auto;
            margin-left: 10px;
        }

        .theme-switch .custom-control-label::before {
            content: '';
        }

        /* Sidebar styles */
        #sidebar {
            display: none;
            position: fixed;
            right: 0;
            top: 0;
            height: 100%;
            width: 250px;
            background-color: #f8f9fa;
            border-left: 1px solid #dee2e6;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-link {
            padding: 10px;
            display: block;
        }

        /* Custom CSS to shift content to the left when sidebar is open */
        .content-shifted {
            margin-right: 250px;
            transition: margin-right 0.3s;
        }

        /* Style for the scroll-back button */
        .btn-scroll-back {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }
/* Style for the "Logout" button in the sidebar */
        .btn-logout {
            background: none;
            border: none;
            padding: 0;
            font: inherit;
            cursor: pointer;
            outline: none;
            text-decoration: none; /* Remove underline */
            color: inherit; /* Inherit text color */
            transition: color 0.3s; /* Add a color transition effect */
        }

        /* Hover effect */
        .btn-logout:hover {
            color: #007bff; /* Change text color on hover (adjust the color as needed) */
        }

        /* Active effect (when the button is clicked) */
        .btn-logout:active {
            color: #0056b3; /* Change text color on click (adjust the color as needed) */
        }

}
    </style>
</head>
<body>

<!-- Header Section -->
<header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="/" onclick="event.preventDefault(); window.location.href='/account';">
            <img src="images/imageLogo.png" alt="Logo" width="30" height="30">
            Accounting
        </a>

        <ul class="navbar-nav ml-auto">

            <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
                <div class="theme-switch custom-control custom-switch d-inline-block">
                    <input type="checkbox" class="custom-control-input" id="themeSwitch">
                    <label class="custom-control-label" for="themeSwitch"></label>
                </div>
            </li>


            <li class="nav-item">
                <input type="image" src="images/userAva.png" alt="Settings" id="settingsButton" class="btn-settings" style="width: 30px; height: 30px; border-radius: 50%; cursor: pointer;margin-top: 5px;">
            </li>
        </ul>
    </nav>
</header>

<!-- Sidebar Section (Initially Hidden) -->
<div id="sidebar" class="bg-light border-right">
    <ul class="list-group list-group-flush">
        <li class="list-group-item"><a href="editProfile">Edit Profile</a></li>
        <li class="list-group-item"><a href="#">Transactions</a></li>
        <li class="list-group-item"><a href="#">Analytics</a></li>
        <li class="list-group-item">
            <form action="/logout" method="POST">
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </li>
    </ul>

    <!-- Add the scroll-back button inside the sidebar -->
    <button id="scrollBackButton" class="btn-scroll-back">
        <img src="images/scroll-back.png" alt="Scroll Back" width="20" height="20">
    </button>
</div>

<!-- Main Content Section -->
<main>
    <!-- Profile Information -->
    <section id="profile-info">
        <h1>User Profile</h1>
        <!-- Display user profile information here -->
    </section>

    <!-- Latest Transactions -->
    <section id="latest-transactions">
        <h2>Latest Transactions</h2>
        <table class="table">
            <!-- Display latest transactions here -->
        </table>
    </section>

    <!-- Analytics -->
    <section id="analytics">
        <h2>Analytics</h2>
        <!-- Display analytics data here -->
    </section>

</main>


<!-- Include Bootstrap JS and jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
    // Function to set the theme based on user preference
    function setTheme() {
        const themeSwitch = document.querySelector('#themeSwitch');
        const isDarkMode = localStorage.getItem('darkMode') === 'true';

        if (isDarkMode) {
            document.body.classList.add('dark-theme');
            themeSwitch.checked = true;
        } else {
            document.body.classList.remove('dark-theme');
            themeSwitch.checked = false;
        }
    }

    // Add an event listener to the theme switch
    const themeSwitch = document.querySelector('#themeSwitch');
    themeSwitch.addEventListener('change', function () {
        const isDarkMode = this.checked;
        localStorage.setItem('darkMode', isDarkMode);
        setTheme(); // Set the theme immediately upon switch change
    });

    // Call setTheme to apply the theme when the page loads
    setTheme();

    const settingsButton = document.getElementById('settingsButton');
    const sidebar = document.getElementById('sidebar');
    const content = document.querySelector('main');
    const scrollBackButton = document.getElementById('scrollBackButton');

    settingsButton.addEventListener('click', function () {
        // Toggle the visibility of the sidebar and shift content when the settings button is clicked
        if (sidebar.style.display === 'none') {
            sidebar.style.display = 'block';
            content.classList.add('content-shifted');
        } else {
            sidebar.style.display = 'none';
            content.classList.remove('content-shifted');
        }
    });

    scrollBackButton.addEventListener('click', function () {
        // Hide the sidebar and remove content shift when the scroll back button is clicked
        sidebar.style.display = 'none';
        content.classList.remove('content-shifted');
    });
</script>
</body>
</html>
