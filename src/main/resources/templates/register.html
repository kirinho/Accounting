<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Accounting Website</title>
  <!-- Bootstrap CSS -->
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <style>
    :root {
        --background-color: #ffffff;
        --text-color: #000000;
    }

    .dark-theme {
        --background-color: #333333;
        --text-color: #ffffff;
    }

    body {
        background-color: var(--background-color);
        color: var(--text-color);
        transition: background-color 0.5s, color 0.5s;
    }

    .theme-switch {
        margin-left: 10px;
        margin-top: 8px;
    }

    .navbar-brand {
        margin-right: auto;
        margin-left: 10px;
    }

    .theme-switch .custom-control-label::before {
        content: '';
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="/">
    <img src="imageLogo.png" alt="Logo" width="30" height="30" class="d-inline-block align-top">
    Accounting
  </a>

  <div class="ml-auto">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" href="/">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="login">Login</a>
      </li>
      <li class="nav-item">
        <div class="theme-switch custom-control custom-switch d-inline-block">
          <input type="checkbox" class="custom-control-input" id="themeSwitch">
          <label class="custom-control-label" for="themeSwitch"></label>
        </div>
      </li>
    </ul>
  </div>
</nav>

<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <h2>Register</h2>
      <form action="process_register.php" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <!-- Add more registration fields as needed -->
        <button type="submit" class="btn btn-primary">Register</button>
      </form>
    </div>
  </div>
</section>

<footer class="text-center py-3">
  <p>&copy; 2023 Accounting Website</p>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
  // Function to set the theme based on user preference
  function setTheme() {
      const themeSwitch = document.querySelector('#themeSwitch');
      const isDarkMode = localStorage.getItem('darkMode') === 'true';

      if (isDarkMode) {
          document.body.classList.add('dark-theme');
          themeSwitch.checked = true;
      } else {
          document.body.classList.remove('dark-theme');
          themeSwitch.checked = false;
      }
  }

  // Add an event listener to the theme switch
  const themeSwitch = document.querySelector('#themeSwitch');
  themeSwitch.addEventListener('change', function () {
      const isDarkMode = this.checked;
      localStorage.setItem('darkMode', isDarkMode);
      setTheme(); // Set the theme immediately upon switch change
  });

  // Call setTheme to apply the theme when the page loads
  setTheme();
</script>

</body>
</html>
