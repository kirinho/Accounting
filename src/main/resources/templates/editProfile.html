<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Profile - Accounting Website</title>
  <!-- Bootstrap CSS -->
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <style>
    :root {
        --background-color: #ffffff;
        --text-color: #000000;
    }

    .dark-theme {
        --background-color: #333333;
        --text-color: #ffffff;
    }

    body {
        background-color: var(--background-color);
        color: var(--text-color);
        transition: background-color 0.5s, color 0.5s;
    }

    .theme-switch {
        margin-left: 10px;
        margin-top: 8px;
    }

    .navbar-brand {
        margin-right: auto;
        margin-left: 10px;
    }

    .theme-switch .custom-control-label::before {
        content: '';
    }

    /* Style for the password toggle button and icons */
    .password-group {
        position: relative;
    }

    .password-toggle {
        cursor: pointer;
        padding: 5px;
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
    }

    /* Style for the custom file input container */
    .file-input-container {
        border: 2px dashed #ccc;
        padding: 20px;
        text-align: center;
        cursor: pointer;
    }

    .file-input-container input[type="file"] {
        display: none;
    }

    /* Style for the custom file input text */
    .file-input-text {
        font-size: 16px;
        color: #666;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <a class="navbar-brand" href="/">
    <img src="images/imageLogo.png" alt="Logo" width="30" height="30" class="d-inline-block align-top">
    Accounting
  </a>

  <div class="ml-auto">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" href="/">Home</a>
      </li>

      <li class="nav-item">
        <div class="theme-switch custom-control custom-switch d-inline-block">
          <input type="checkbox" class="custom-control-input" id="themeSwitch">
          <label class="custom-control-label" for="themeSwitch"></label>
        </div>
      </li>
    </ul>
  </div>
</nav>

<section class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2>Edit Profile</h2>
      <form action="process_edit_profile.php" method="POST">
        <!-- Profile Photo Upload -->
        <div class="form-group profile-photo-upload">
          <label for="profilePhoto">Profile Photo</label>
          <div class="file-input-container">
            <label for="profilePhoto" class="file-input-text">Drag & Drop or Click to Upload</label>
            <input type="file" class="form-control-file" id="profilePhoto" name="profilePhoto">
          </div>
        </div>
        <!-- Surname -->
        <div class="form-group">
          <label for="surname">Surname</label>
          <input type="text" class="form-control" id="surname" name="surname" required>
        </div>
        <!-- Name -->
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <!-- Birthday Date -->
        <div class="form-group">
          <label for="birthdayDate">Birthday Date</label>
          <input type="date" class="form-control" id="birthdayDate" name="birthdayDate">
        </div>
        <!-- Quotes -->
        <div class="form-group">
          <label for="quotes">Quotes</label>
          <textarea class="form-control" id="quotes" name="quotes" rows="4"></textarea>
        </div>
        <!-- Save Changes Button -->
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>
</section>

<footer class="text-center py-3">
  <p>&copy; 2023 Accounting Website</p>
</footer>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script>
  // Function to set the theme based on user preference
  function setTheme() {
      const themeSwitch = document.querySelector('#themeSwitch');
      const isDarkMode = localStorage.getItem('darkMode') === 'true';

      if (isDarkMode) {
          document.body.classList.add('dark-theme');
          themeSwitch.checked = true;
      } else {
          document.body.classList.remove('dark-theme');
          themeSwitch.checked = false;
      }
  }

  // Add an event listener to the theme switch
  const themeSwitch = document.querySelector('#themeSwitch');
  themeSwitch.addEventListener('change', function () {
      const isDarkMode = this.checked;
      localStorage.setItem('darkMode', isDarkMode);
      setTheme(); // Set the theme immediately upon switch change
  });

  // Call setTheme to apply the theme when the page loads
  setTheme();
</script>

</body>
</html>
